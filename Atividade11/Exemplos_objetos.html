<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CriarObj</title>
</head>

<body>
    <script>
        var aluno1 = new Object();
        //Usando object
        aluno1.ra = "0030482413016";
        aluno1.nome = "Gustavo";
        alert(`ra=${aluno1.ra} nome=${aluno1.nome}`);

        var aluno2 = {};
        aluno2.ra = "1234";
        aluno2["nome"] = "Gabriela";
        alert("ra=" + aluno2.ra + " nome=" + aluno2.nome);
        aluno2["email do aluno"] = "gabriela@gmail.com";
        alert(aluno2["email do aluno"]);

        var aluno3 = {
            ra: "1234567",
            nome: "Marcos",
        };
        alert("ra=" + aluno3.ra + " nome=" + aluno3.nome);

        function Aluno(ra, nome){
            this.ra = ra;
            this.nome = nome;
            this.MostrarDados = function(){
                return "ra=" + this.ra + " nome=" + this.nome;
            }
        }
        var aluno4 = new Aluno("123", "Vitor");
        alert(aluno4.MostrarDados());
        alert(aluno4.nome);
        
        function Aluno2(){
            var ra;
            var nome;
            this.setRa = function(value){
                this.ra = value;
            }
            this.getRa = function(){
                return this.ra;
            }
            this.setNome = function(value){
                this.nome = value;
            }
            this.getNome = function(){
                return this.nome;
            }
        }
        var aluno6 = new Aluno2();
        aluno6.setNome("Nickolas");
        aluno6.setRa("234");
        alert("ra=" + aluno6.getRa() + " nome=" + aluno6.getNome());
    
        function AlunoADS(){
            var numLab;
            this.setnumLab = function(value){
                this.numLab = value;
            }
            this.getnumLab = function(){
                return this.numLab;
            }
        }
        //herança
        AlunoADS.prototype = new Aluno2();
        var aluno7 = new AlunoADS();
        aluno7.setNome("Maria Luiza");
        aluno7.setRa("123");
        aluno7.setnumLab(5);
        alert(aluno7.getNome() + " " + aluno7.getnumLab());

        class Aluno1{
            constructor(){
                this._ra;
                this._nome;
            }
            setNome(value){
                this._nome = value;
            }
            getNome(){
                return this._nome;
            }
            setRa(value){
                this._ra = value;
            }
            getRa(){
                return this._ra;
            }
        }
        var objAluno = new Aluno1();
        objAluno.setNome("Eduardo");
        objAluno.setRa('123');
        alert(`nome=${objAluno.getNome()} ra=${objAluno.getRa()} `);

        class AlunoADS1 extends Aluno1{
            constructor(){
                super();
                this._numLab;
            }
            setNumLab(value){
                this._numLab = value;
            }
            getNumLab(){
                return this._numLab;
            }
        }

        var objAlunoADS = new AlunoADS1();
        objAlunoADS.setNome("Caio");
        objAlunoADS.setRa("123");
        objAlunoADS.setNumLab(6);
        alert(`nome=${objAlunoADS.getNome()} ra=${objAlunoADS.getRa()} numlab=${objAlunoADS.getNumLab()}`);

        var obj1 = new Object();
        var obj2 = obj1;
        obj1.nome = "Matheus";
        alert(obj2.nome);

        class ContaBancaria{
            #cpf;

            constructor(nome, saldoInicial){
                this.nome = nome;
                this.saldo = saldoInicial;
            }

            setCpf(value){
                this.cpf = value;
            }
            getCpf(){
                return this.cpf;
            }
            getSaldo(){
                return this.saldo;
            }
            //método público
            depositar(valor){
                this.saldo += valor;
                this.#registrarTransacao(valor);
            }

            #registrarTransacao(valor){
                console.log(`Depósito de R$ ${valor} Saldo R$ ${this.saldo} para cpf ${this.getCpf()} OU ${this.#cpf}`);
            }
        }

        const conta = new ContaBancaria("Gustavo2", 1000);
        conta.setCpf(123);
        conta.depositar(50);

        const arr = [
            ['codigo', 1],
            ['nome', "João"],
            ['idade', 23]

        ]
        const obj = Object.fromEntries(arr);
        alert(obj);
        alert(obj.nome);
        alert(JSON.stringify(obj))

        const objEmpresa = {
            empresa: 'ZF do Brasil'
        };
        const funcionario = Object.create(objEmpresa, {
            nome: {
                value: 'Jorge'
            },
            endereco: {
                value: 'Av. São Paulo'
            }
        });
        console.log(funcionario.empresa);
        console.log(funcionario.nome);
        console.log(funcionario.endereco);

        const objNovaEmpresa = {
            empresa: 'ZF do Brasil'
        };
        const objVeiculo = {
            placa: 'xxx 6767'
        };
        const motorista = Object.assign({
            cpf: "123"
        }, objNovaEmpresa, objVeiculo);
        console.log(motorista);
        
    </script>
</body>
</html>
